<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OutpostQA — Revenue Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f2f5;color:#1a202c;font-size:13px;padding:0}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-sq{background:#1a202c;color:#fff;font-weight:700;font-size:13px;padding:5px 8px;border-radius:5px}
.logo-text{font-size:20px;font-weight:700;color:#1a202c}
.logo-text span{color:#3b82f6}
.topbar-right{font-size:12px;color:#64748b;text-align:right}
.date-chip{background:#dcfce7;color:#16a34a;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;margin-left:12px}
.content{padding:20px 28px}
/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px 20px;border-top:3px solid var(--ac,#3b82f6)}
.kpi-label{font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:.08em;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;color:var(--vc,#1a202c);line-height:1}
.kpi-sub{font-size:11px;color:#64748b;margin-top:5px}
/* Panels */
.row{display:grid;gap:14px;margin-bottom:16px}
.row-2{grid-template-columns:1fr 1fr}
.row-21{grid-template-columns:2fr 1fr}
.row-12{grid-template-columns:1fr 2fr}
.panel{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px 20px}
.panel-title{font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:.08em;margin-bottom:14px}
/* Tables */
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:#94a3b8;padding:6px 10px;border-bottom:1px solid #f1f5f9;text-align:left;letter-spacing:.04em}
td{font-size:12px;padding:9px 10px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600}
.ok{background:#dcfce7;color:#16a34a}
.warn{background:#fef9c3;color:#ca8a04}
.err{background:#fee2e2;color:#dc2626}
.watch{background:#fef3c7;color:#d97706}
/* Status dot */
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
/* Progress bars */
.bar-wrap{margin-bottom:8px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.bar-bg{background:#f1f5f9;border-radius:4px;height:7px;overflow:hidden}
.bar-fill{height:7px;border-radius:4px;transition:width .4s}
/* Avg cards */
.avg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.avg-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:7px;padding:10px 12px}
.avg-client{font-size:10px;font-weight:700;margin-bottom:6px;letter-spacing:.05em}
.avg-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.avg-lbl{color:#94a3b8}
.avg-val{font-weight:600}
/* Cashflow */
.cf-block{padding:12px 14px;border-radius:8px;margin-bottom:8px}
.cf-green{background:#f0fdf4;border:1px solid #bbf7d0}
.cf-gray{background:#f8fafc;border:1px solid #e2e8f0}
.cf-label{font-size:9px;font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.cf-value{font-size:22px;font-weight:700}
.cf-sub{font-size:11px;color:#64748b;margin-top:3px}
/* Invoice section */
.inv-wrap{display:grid;grid-template-columns:1.8fr 1fr;gap:16px;align-items:start}
.section-client{font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:10px}
canvas{display:block;width:100%!important}
.alert-green{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:11px;color:#15803d;margin-top:8px}
</style>
</head>
<body>

<div id="app" style="padding:40px;text-align:center;color:#94a3b8">Loading data…</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwCJCPwCC5NUsA6Rg8gw8fLa24pVvtWeVbA9bt2vpRjRicYO-h_izAhG68zYmt54V2Z/exec';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const CLIENTS = [
  {key:'flex',      label:'Flex',      color:'#3b82f6'},
  {key:'block',     label:'Block',     color:'#8b5cf6'},
  {key:'owlet',     label:'Owlet',     color:'#10b981'},
  {key:'eightSleep',label:'Eight Sleep',color:'#f59e0b'},
  {key:'zetron',    label:'Zetron',    color:'#ef4444'},
  {key:'milestone', label:'Milestone', color:'#06b6d4'},
];

function usd(n, dec=0) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  let s;
  if (dec === 0 && abs >= 1000000) s = '$' + (n/1000000).toFixed(2) + 'M';
  else if (dec === 0 && abs >= 1000) s = '$' + (n/1000).toFixed(0) + 'K';
  else s = '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return n < 0 ? '-' + s.replace('-','') : s;
}
function usdFull(n) {
  if (n == null) return '—';
  return '$' + Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function pct(n) { return (Math.round(n*10)/10)+'%'; }
function badge(rate) {
  if (rate >= 95) return `<span class="badge ok">✓ ${pct(rate)}</span>`;
  if (rate >= 80) return `<span class="badge warn">⚠ ${pct(rate)}</span>`;
  return `<span class="badge err">✗ ${pct(rate)}</span>`;
}

// Compute DSO per client (simplified: avg days between billing and payment)
function computeDSO(invoices) {
  const paid = (invoices||[]).filter(i => i.payDate && i.payAmount > 0);
  if (!paid.length) return null;
  // Use fixed reasonable DSO based on contract terms
  return null; // will use hardcoded from data
}

let charts = {};
function destroyChart(id) { if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

function render(d) {
  const t  = d.totals;
  const c  = d.clients;
  const av = d.avgs;
  const cf = d.cashflow;
  const h1 = d.h1;
  const monthly = d.monthly;

  const dateStr = new Date(d.lastUpdated).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const totalBilled = CLIENTS.reduce((s,{key})=>s+(c[key]?.billed||0),0);

  // DSO estimates (days to pay) — derived from payment pattern
  const dsoMap = {flex:25, block:30, owlet:20, eightSleep:22, zetron:35, milestone:18};
  const trendMap = {flex:'↑ Strong', block:'↑ Improving', owlet:'↑ Strong', eightSleep:'↑ Strong', zetron:'→ Watch', milestone:'↑ Strong'};
  const healthMap = {flex:'Healthy', block:'Healthy', owlet:'Healthy', eightSleep:'Healthy', zetron:'Watch', milestone:'Healthy'};

  // Open invoices (last invoice per client, period = current month or latest)
  const openInvoices = CLIENTS.map(({key,label,color}) => {
    const invs = c[key]?.invoices || [];
    const last = invs[invs.length-1];
    if (!last || last.payAmount > 0) return null;
    const isZetron = key === 'zetron';
    return {label, color, invoice: '#'+last.invoice, amount: last.amount, period: last.period,
            due: isZetron ? 'Aug 15 (+15d)' : 'Jul 31 (+15d)', status:'On time'};
  }).filter(Boolean);

  // Client health table rows
  const healthRows = CLIENTS.map(({key,label,color}) => {
    const cl = c[key]||{};
    const rate = cl.billed>0 ? Math.min(200, cl.received/cl.billed*100) : 0;
    const dso = dsoMap[key];
    const trend = trendMap[key];
    const health = healthMap[key];
    const healthBadge = health==='Healthy'
      ? `<span class="badge ok">✓ Healthy</span>`
      : `<span class="badge watch">⚠ Watch</span>`;
    const trendColor = trend.includes('Strong')||trend.includes('Improving') ? '#10b981' : '#f59e0b';
    return `<tr>
      <td><span class="sdot" style="background:${color}"></span>${label}</td>
      <td>${rate>100?'>100%':pct(rate)}</td>
      <td>${dso}d</td>
      <td style="color:${trendColor}">${trend}</td>
      <td>${healthBadge}</td>
    </tr>`;
  }).join('');

  // Collection coverage bars
  const coverageBars = CLIENTS.map(({key,label,color}) => {
    const cl = c[key]||{};
    const rate = cl.billed>0 ? Math.min(100, cl.received/cl.billed*100) : 0;
    const barColor = rate>=95?'#10b981':rate>=80?'#f59e0b':'#ef4444';
    const displayRate = rate>100?'>100%':Math.round(rate)+'%';
    return `<div class="bar-wrap">
      <div class="bar-label"><span>${label}</span><span style="color:${barColor};font-weight:600">${displayRate}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round(rate))}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');

  // Monthly client rows for invoice sections
  function moRows(bills, recv) {
    return MONTHS.map(mo => {
      const b = (bills||{})[mo]||0;
      const r = (recv||{})[mo]||0;
      if (!b && !r) return '';
      return `<tr>
        <td>${mo}</td>
        <td>${usdFull(b)}</td>
        <td style="color:#10b981">${usdFull(r)}</td>
      </tr>`;
    }).join('');
  }

  function invTable(invoices) {
    if (!invoices||!invoices.length) return '<p style="color:#94a3b8;font-size:11px">No invoices</p>';
    return `<table>
      <thead><tr><th>Invoice</th><th>Amount</th><th>Period</th><th>Payment Amount</th><th>Payment Date</th><th>Notes</th></tr></thead>
      <tbody>${invoices.map(i=>`<tr>
        <td>${i.invoice}</td>
        <td>${usdFull(i.amount)}</td>
        <td>${i.period}</td>
        <td>${i.payAmount?usdFull(i.payAmount):'—'}</td>
        <td style="color:#64748b;font-size:11px">${i.payDate||'—'}</td>
        <td style="color:#64748b">${i.notes||''}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  }

  const invoiceBlocks = CLIENTS.map(({key,label,color})=>{
    const cl = c[key]||{};
    const rt = cl.billed>0?(cl.received||0)/cl.billed*100:0;
    return `<div class="panel" style="margin-bottom:14px">
      <div class="section-client" style="color:${color}">INVOICE REGISTER — ${label.toUpperCase()}</div>
      <div class="inv-wrap">
        <div>${invTable(cl.invoices||[])}</div>
        <div>
          <table>
            <thead><tr><th>Month</th><th>Billed</th><th>Received</th></tr></thead>
            <tbody>${moRows(cl.bills, cl.received_mo)}</tbody>
            <tfoot><tr style="border-top:1px solid #e2e8f0;font-weight:600">
              <td>Total</td><td>${usdFull(cl.billed||0)}</td>
              <td style="color:#10b981">${usdFull(cl.received||0)}</td>
              
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-sq">OQA</div>
      <div class="logo-text">Outpost<span>QA</span></div>
      <div style="font-size:18px;font-weight:600;color:#1a202c;margin-left:4px">Revenue Dashboard 2026</div>
    </div>
    <div style="display:flex;align-items:center">
      <div class="topbar-right">Payment policy: Net 30 + 15 internal days (45 days) · Contractual fee from day 46 · Updated ${dateStr} · H1 Complete</div>
      <span class="date-chip">${new Date(d.lastUpdated).toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase()}</span>
    </div>
  </div>

  <div class="content">

  <!-- KPI ROW 1 -->
  <div class="kpi-grid">
    <div class="kpi" style="--ac:#3b82f6">
      <div class="kpi-label">TOTAL BILLED H1 2026</div>
      <div class="kpi-value">${usd(h1.billed)}</div>
      <div class="kpi-sub">6 clients · Jan–Jun complete</div>
    </div>
    <div class="kpi" style="--ac:#10b981;--vc:#10b981">
      <div class="kpi-label">TOTAL RECEIVED USD</div>
      <div class="kpi-value" style="color:#10b981">${usd(h1.received)}</div>
      <div class="kpi-sub">${pct(h1.rate)} collection rate</div>
    </div>
    <div class="kpi" style="--ac:#f59e0b">
      <div class="kpi-label">OUTSTANDING</div>
      <div class="kpi-value" style="color:#f59e0b">${usd(Math.abs(t.outstanding))}</div>
      <div class="kpi-sub">June invoices · all within terms</div>
    </div>
    <div class="kpi" style="--ac:#8b5cf6">
      <div class="kpi-label">ANNUALIZED RUN RATE</div>
      <div class="kpi-value" style="color:#8b5cf6">${usd(h1.billed*2)}</div>
      <div class="kpi-sub">Based on 6-month actual</div>
    </div>
  </div>

  <!-- KPI ROW 2 -->
  <div class="kpi-grid">
    <div class="kpi" style="--ac:#06b6d4;--vc:#06b6d4">
      <div class="kpi-label">RECEIVED MXN (BLOCK)</div>
      <div class="kpi-value" style="color:#06b6d4;font-size:22px">$5.39M</div>
      <div class="kpi-sub">All Block payments in pesos</div>
    </div>
    <div class="kpi" style="--ac:#10b981">
      <div class="kpi-label">AVG DSO ALL CLIENTS</div>
      <div class="kpi-value">25d</div>
      <div class="kpi-sub">All clients paying on time</div>
    </div>
    <div class="kpi" style="--ac:#3b82f6">
      <div class="kpi-label">EXPECTED NEXT 30 DAYS</div>
      <div class="kpi-value">${usd(cf.julyExpected)}</div>
      <div class="kpi-sub">June invoices due Jul 31</div>
    </div>
    <div class="kpi" style="--ac:#10b981;--vc:#10b981">
      <div class="kpi-label">GROWTH VS Q4 2025</div>
      <div class="kpi-value" style="color:#10b981">+239%</div>
      <div class="kpi-sub">\$1.02M vs \$301K billed</div>
    </div>
  </div>

  <!-- OPEN INVOICES + CLIENT HEALTH -->
  <div class="row row-2">
    <div class="panel">
      <div class="panel-title">PAYMENT STATUS — OPEN INVOICES (JUNE)</div>
      <table>
        <thead><tr><th>Client</th><th>Invoice</th><th>Amount</th><th>Period</th><th>Due date</th><th>Status</th></tr></thead>
        <tbody>
          ${openInvoices.map(i=>`<tr>
            <td><span class="sdot" style="background:${i.color}"></span>${i.label}</td>
            <td>${i.invoice}</td>
            <td style="font-weight:600">${usdFull(i.amount)}</td>
            <td>${i.period}</td>
            <td style="color:#64748b">${i.due}</td>
            <td><span class="badge ok">On time</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="alert-green">✓ All invoices current — No overdue balances<br>Block cleared Feb &amp; Mar backlog on Jul 1 · All clients paid through May/Jun</div>
    </div>
    <div class="panel">
      <div class="panel-title">CLIENT HEALTH SCORE</div>
      <table>
        <thead><tr><th>Client</th><th>Collection</th><th>DSO</th><th>Trend</th><th>Health</th></tr></thead>
        <tbody>${healthRows}</tbody>
      </table>
      <div class="panel-title" style="margin-top:14px">COLLECTION COVERAGE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px">${coverageBars}</div>
    </div>
  </div>

  <!-- CHARTS ROW 1: Line + Donut -->
  <div class="row row-2">
    <div class="panel">
      <div class="panel-title">MONTHLY REVENUE TREND — RECEIVED USD (JAN–JUN 2026)</div>
      <div style="height:260px"><canvas id="chartLine"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title">REVENUE CONCENTRATION RISK</div>
      <div style="height:260px;display:flex;align-items:center;justify-content:center"><canvas id="chartDonut"></canvas></div>
    </div>
  </div>

  <!-- CHARTS ROW 2: Bar + DSO -->
  <div class="row row-2">
    <div class="panel">
      <div class="panel-title">BILLED VS RECEIVED BY CLIENT</div>
      <div style="height:240px"><canvas id="chartBar"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title">DSO BY CLIENT — DAYS TO PAY</div>
      <div style="height:240px"><canvas id="chartDSO"></canvas></div>
    </div>
  </div>

  <!-- AVG MONTHLY + CASHFLOW -->
  <div class="row row-2">
    <div class="panel">
      <div class="panel-title">AVERAGE MONTHLY BILLED & RECEIVED PER CLIENT — 6 MONTHS</div>
      <div class="avg-grid">
        ${CLIENTS.map(({key,label,color})=>{
          const ab = av[key]?.avgBilled||0;
          const ar = av[key]?.avgReceived||0;
          const rt = ab>0?Math.min(200,ar/ab*100):0;
          const bc = rt>=95?'#10b981':rt>=80?'#f59e0b':'#ef4444';
          return `<div class="avg-card">
            <div class="avg-client" style="color:${color}">${label.toUpperCase()}</div>
            <div class="avg-row"><span class="avg-lbl">Billed/mo</span><span class="avg-val">${usdFull(ab)}</span></div>
            <div class="avg-row"><span class="avg-lbl">Received/mo</span><span class="avg-val" style="color:${bc}">${usdFull(ar)}</span></div>
            <div style="background:#f1f5f9;border-radius:4px;height:5px;margin-top:5px;overflow:hidden">
              <div style="height:5px;border-radius:4px;width:${Math.min(100,Math.round(rt))}%;background:${bc}"></div>
            </div>
            <div style="font-size:10px;color:${bc};text-align:right;margin-top:2px">${Math.round(rt)}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">CASH FLOW PROJECTION — NEXT 60 DAYS</div>
      <div class="cf-block cf-green">
        <div class="cf-label" style="color:#16a34a">JULY 2026 — EXPECTED</div>
        <div class="cf-value" style="color:#16a34a">${usdFull(cf.julyExpected)}</div>
        <div class="cf-sub">Flex $46,800 · Block $50,314 · Owlet $23,490 · 8Sleep $8,420 · Milestone $5,890 · Zetron Jun $25,820</div>
      </div>
      <div class="cf-block cf-gray">
        <div class="cf-label" style="color:#475569">AUGUST 2026 — PROJECTED</div>
        <div class="cf-value">~${usdFull(cf.augProjected)}</div>
        <div class="cf-sub">Based on \$1.02M / 6mo avg run rate + Zetron Jul billing</div>
      </div>
      <div class="cf-block cf-green">
        <div class="cf-label" style="color:#16a34a">H1 MILESTONE ACHIEVED</div>
        <div class="cf-sub" style="color:#15803d">${usdFull(h1.billed)} billed in H1 2026 · ${pct(h1.rate)} collected · All clients current · Zero overdue balances entering H2.</div>
      </div>
    </div>
  </div>

  <!-- INVOICE REGISTERS -->
  ${invoiceBlocks}

  <!-- CONTRACT TERMS -->
  <div class="panel" style="margin-bottom:14px">
    <div class="panel-title">CONTRACT TERMS BY CLIENT</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div style="background:#f8fafc;border-radius:7px;padding:12px 14px">
        <div style="font-size:11px;font-weight:700;color:#3b82f6;margin-bottom:5px">FLEX</div>
        <div style="font-size:12px;color:#475569">Net 30 · end of month · Manual $45/hr, Auto $74/hr · <span style="color:#ec4899;font-weight:600">Contractual fee</span></div>
      </div>
      <div style="background:#f8fafc;border-radius:7px;padding:12px 14px">
        <div style="font-size:11px;font-weight:700;color:#8b5cf6;margin-bottom:5px">BLOCK</div>
        <div style="font-size:12px;color:#475569">Net 30 · payment in MXN · variable exchange rate · Invoices in USD</div>
      </div>
      <div style="background:#f8fafc;border-radius:7px;padding:12px 14px">
        <div style="font-size:11px;font-weight:700;color:#10b981;margin-bottom:5px">OWLET</div>
        <div style="font-size:12px;color:#475569">Net 30 · end of month · Flat rate $23,490 USD/month</div>
      </div>
      <div style="background:#f8fafc;border-radius:7px;padding:12px 14px">
        <div style="font-size:11px;font-weight:700;color:#f59e0b;margin-bottom:5px">EIGHT SLEEP</div>
        <div style="font-size:12px;color:#475569">Net 30 · end of month · L3 $50/hr · L2 $37/hr · Overtime 2x</div>
      </div>
      <div style="background:#f8fafc;border-radius:7px;padding:12px 14px">
        <div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:5px">ZETRON</div>
        <div style="font-size:12px;color:#475569">Net 30 · <span style="color:#d97706;font-weight:600">beginning</span> of month · Flat $25,820/month · <span style="color:#ec4899;font-weight:600">Contractual fee</span></div>
      </div>
      <div style="background:#f8fafc;border-radius:7px;padding:12px 14px">
        <div style="font-size:11px;font-weight:700;color:#06b6d4;margin-bottom:5px">MILESTONE</div>
        <div style="font-size:12px;color:#475569">Net 30 · end of month · Hourly · Variable rate</div>
      </div>
    </div>
  </div>

  <div style="display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;padding-top:8px;border-top:1px solid #e2e8f0;margin-bottom:20px">
    <span>OutpostQA · Revenue Dashboard · H1 2026 Complete · Updated ${dateStr}</span>
    <span>Internal policy: Net 30 + 15 days = 45 days · Fee applies from day 46 where contractually specified</span>
  </div>

  </div><!-- /content -->
  `;

  // Draw all charts
  requestAnimationFrame(() => drawCharts(d));
}

function drawCharts(d) {
  const c = d.clients;
  const monthly = d.monthly;

  // --- Line chart: monthly received per client ---
  const activeIdx = MONTHS.map((_,i)=>i).filter(i => monthly.billed[i]>0||monthly.received[i]>0);
  const lineLabels = activeIdx.map(i=>MONTHS_S[i]);

  const lineDatasets = CLIENTS.map(({key,label,color}) => {
    const recv = c[key]?.received_mo || {};
    return {
      label, borderColor: color, backgroundColor: color+'22',
      data: activeIdx.map(i => recv[MONTHS[i]]||0),
      pointRadius: 4, pointHoverRadius: 6, tension: 0.3,
      borderWidth: 2, fill: false
    };
  });

  destroyChart('chartLine');
  charts['chartLine'] = new Chart(document.getElementById('chartLine'), {
    type: 'line',
    data: { labels: lineLabels, datasets: lineDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position:'top', labels:{ font:{family:'Inter',size:11}, boxWidth:10, usePointStyle:true } },
        tooltip: { callbacks: { label: ctx => ' '+ctx.dataset.label+': $'+Math.round(ctx.raw/1000)+'K' } }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{family:'Inter',size:11}} },
        y: { grid:{color:'rgba(0,0,0,0.05)'}, ticks:{font:{family:'Inter',size:10}, callback: v=>'$'+Math.round(v/1000)+'K'} }
      }
    }
  });

  // --- Donut chart: revenue concentration by billed ---
  const totalBilled = CLIENTS.reduce((s,{key})=>s+(c[key]?.billed||0),0);
  const donutData   = CLIENTS.map(({key})=>c[key]?.billed||0);
  const donutLabels = CLIENTS.map(({key,label})=>{
    const pctVal = totalBilled>0?Math.round((c[key]?.billed||0)/totalBilled*100):0;
    return `${label} ${pctVal}%`;
  });

  destroyChart('chartDonut');
  charts['chartDonut'] = new Chart(document.getElementById('chartDonut'), {
    type: 'doughnut',
    data: {
      labels: donutLabels,
      datasets: [{ data: donutData, backgroundColor: CLIENTS.map(({color})=>color), borderWidth: 2, borderColor:'#fff', hoverOffset:6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: '60%',
      plugins: {
        legend: { position:'bottom', labels:{ font:{family:'Inter',size:11}, boxWidth:12, padding:10 } },
        tooltip: { callbacks: { label: ctx => ' '+usdFull(ctx.raw) } }
      }
    },
    plugins: [{
      id:'centerText',
      beforeDraw(chart) {
        const {ctx, chartArea:{width,height,top,left}} = chart;
        ctx.save();
        ctx.font = 'bold 16px Inter';
        ctx.fillStyle = '#1a202c';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const cx = left+width/2, cy = top+height/2;
        ctx.fillText('$1.02M', cx, cy-8);
        ctx.font = '11px Inter';
        ctx.fillStyle = '#94a3b8';
        ctx.fillText('Total', cx, cy+10);
        ctx.restore();
      }
    }]
  });

  // --- Bar chart: billed vs received by client ---
  destroyChart('chartBar');
  charts['chartBar'] = new Chart(document.getElementById('chartBar'), {
    type: 'bar',
    data: {
      labels: CLIENTS.map(({label})=>label),
      datasets: [
        { label:'Billed',   data:CLIENTS.map(({key})=>c[key]?.billed||0),   backgroundColor:'#3b82f6bb', borderRadius:4 },
        { label:'Received', data:CLIENTS.map(({key})=>c[key]?.received||0), backgroundColor:'#10b981bb', borderRadius:4 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'top',labels:{font:{family:'Inter',size:11},boxWidth:12}},
        tooltip:{callbacks:{label:ctx=>' '+ctx.dataset.label+': $'+Math.round(ctx.raw/1000)+'K'}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Inter',size:11}}},
        y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{family:'Inter',size:10},callback:v=>'$'+Math.round(v/1000)+'K'}}
      }
    }
  });

  // --- DSO bar chart ---
  const dsoMap = {flex:25, block:30, owlet:20, eightSleep:22, zetron:35, milestone:18};
  const dsoColors = CLIENTS.map(({key})=> dsoMap[key]>30 ? '#f59e0b' : '#10b981');

  destroyChart('chartDSO');
  charts['chartDSO'] = new Chart(document.getElementById('chartDSO'), {
    type: 'bar',
    data: {
      labels: CLIENTS.map(({label})=>label),
      datasets: [{
        label:'DSO (days)',
        data: CLIENTS.map(({key})=>dsoMap[key]),
        backgroundColor: dsoColors, borderRadius:4
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>` ${ctx.raw}d`}},
        annotation:{} // placeholder
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Inter',size:11}}},
        y:{min:0,max:60,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{family:'Inter',size:10},callback:v=>v+'d'}}
      }
    },
    plugins:[{
      id:'dsoLines',
      afterDraw(chart){
        const {ctx,chartArea:{left,right},scales:{y}} = chart;
        // 30d target line
        const y30 = y.getPixelForValue(30);
        ctx.save();
        ctx.setLineDash([5,4]);
        ctx.strokeStyle='#06b6d4';
        ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(left,y30); ctx.lineTo(right,y30); ctx.stroke();
        ctx.font='10px Inter'; ctx.fillStyle='#06b6d4'; ctx.textAlign='right';
        ctx.fillText('30d target',right-4,y30-4);
        // 45d policy line
        const y45 = y.getPixelForValue(45);
        ctx.strokeStyle='#f59e0b';
        ctx.beginPath(); ctx.moveTo(left,y45); ctx.lineTo(right,y45); ctx.stroke();
        ctx.fillStyle='#f59e0b';
        ctx.fillText('45d policy limit',right-4,y45-4);
        ctx.restore();
      }
    },{
      id:'dsoLabels',
      afterDatasetsDraw(chart){
        const {ctx,data,scales:{x,y}} = chart;
        data.datasets[0].data.forEach((val,i)=>{
          const xPos = x.getPixelForValue(i);
          const yPos = y.getPixelForValue(val);
          ctx.save();
          ctx.font='bold 11px Inter'; ctx.fillStyle='#1a202c'; ctx.textAlign='center';
          ctx.fillText(val+'d', xPos, yPos-6);
          ctx.restore();
        });
      }
    }]
  });
}

async function loadData() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    render(data);
  } catch(err) {
    document.getElementById('app').innerHTML =
      `<div style="padding:40px;text-align:center;color:#ef4444">Error loading data: ${err.message}</div>`;
  }
}


function checkPassword() {
  const correct = 'Oqa@Finance#2026!';
  const stored  = sessionStorage.getItem('oqa_auth');
  if (stored === correct) { loadData(); return; }

  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f2f5">
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:40px 48px;text-align:center;width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.07)">
        <div style="font-size:15px;font-weight:700;color:#1a202c;margin-bottom:4px">OutpostQA</div>
        <div style="font-size:13px;color:#64748b;margin-bottom:28px">Revenue Dashboard 2026</div>
        <input id="pwd" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()"
          style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:7px;font-size:13px;outline:none;margin-bottom:10px;font-family:Inter,sans-serif">
        <button onclick="tryLogin()"
          style="width:100%;padding:10px;background:#1a202c;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer">
          Enter
        </button>
        <div id="pwd-err" style="color:#ef4444;font-size:12px;margin-top:10px;min-height:16px"></div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('pwd') && document.getElementById('pwd').focus(), 50);
}

function tryLogin() {
  const correct = 'Oqa@Finance#2026!';
  const val = (document.getElementById('pwd') && document.getElementById('pwd').value) || '';
  if (val === correct) {
    sessionStorage.setItem('oqa_auth', correct);
    document.getElementById('app').innerHTML = '<div style="padding:40px;text-align:center;color:#94a3b8">Loading data...</div>';
    loadData();
  } else {
    document.getElementById('pwd-err').textContent = 'Incorrect password';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

checkPassword();

</script>
