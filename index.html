<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OutpostQA — Revenue Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#d4d8de;--bg2:#eaecef;--bg3:#c8ccd2;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a1e25;--text2:#5a6a7a;--text3:#8a9ab0;--green:#1dbd8a;--green-bg:rgba(29,189,138,0.12);--amber:#d4920a;--amber-bg:rgba(212,146,10,0.12);--red:#e05555;--red-bg:rgba(224,85,85,0.12);--pink:#d4538a;--pink-bg:rgba(212,83,138,0.12);--radius:7px;--radius-sm:5px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:1.5rem 2rem;font-size:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:5mm;padding-bottom:3mm;border-bottom:0.5px solid var(--border2)}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:28px;font-weight:600}
.header-sub{font-size:12px;color:var(--text3);margin-top:4px}
.date-chip{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(29,189,138,.25);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;font-family:'DM Mono',monospace}
.sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:0.5px;background:var(--border2)}
.card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
.grid2r{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--green))}
.metric-label{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:.04em;font-weight:600}
.metric-value{font-size:24px;font-weight:500;font-family:'DM Mono',monospace}
.metric-sub{font-size:11px;color:var(--text2);margin-top:4px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);padding:7px 10px;border-bottom:0.5px solid var(--border2);letter-spacing:.04em}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ok{background:var(--green-bg);color:var(--green)}
.warn{background:var(--amber-bg);color:var(--amber)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.mono{font-family:'DM Mono',monospace}
.muted{color:var(--text2)}
.note-item{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 14px;font-size:12px;color:var(--text2);line-height:1.6}
.note-client{font-size:11px;font-weight:700;color:#3266ad;margin-bottom:4px;letter-spacing:.05em}
.footer{margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border2);font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
.hp{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.hp-g{background:var(--green-bg);color:var(--green)}
.hp-a{background:var(--amber-bg);color:var(--amber)}
.gap{margin-bottom:10px}
.loading{text-align:center;padding:3rem;color:var(--text3);font-family:'DM Mono',monospace;font-size:13px}
.bar-bg{width:100%;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.bar-fill{height:6px;border-radius:4px}
</style>
</head>
<body>

<div id="app"><div class="loading">Loading data from Google Sheets…</div></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzwgz0yI5H6xrqWluT9ztEGDU09a6VASKNFGNuyKi0usSZrhe7G1PxoHQTw1MmH03Fw/exec';

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function usd(n, decimals) {
  if (n === undefined || n === null) return '—';
  return '$' + Number(n).toLocaleString('en-US', {
    minimumFractionDigits: decimals !== undefined ? decimals : 2,
    maximumFractionDigits: decimals !== undefined ? decimals : 2
  });
}

function pct(n) { return Math.round(n * 10) / 10 + '%'; }

function collBadge(rate) {
  if (rate >= 95) return '<span class="badge ok">✓ ' + pct(rate) + '</span>';
  if (rate >= 80) return '<span class="badge warn">⚠ ' + pct(rate) + '</span>';
  return '<span class="badge" style="background:var(--red-bg);color:var(--red)">✗ ' + pct(rate) + '</span>';
}

function barBlock(client, label, color, billed, received) {
  const rate = billed > 0 ? Math.min(100, received / billed * 100) : 0;
  const barColor = rate >= 95 ? 'var(--green)' : rate >= 80 ? 'var(--amber)' : 'var(--red)';
  return `<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:5px 7px;border:0.5px solid var(--border)">
    <div style="font-size:7px;font-weight:700;color:${color};margin-bottom:4px">${label}</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:1px">
      <span style="font-size:7px;color:var(--text3)">Billed/mo</span>
      <span style="font-size:8px;font-weight:600;font-family:DM Mono,monospace">${usd(billed,0)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span style="font-size:7px;color:var(--text3)">Received/mo</span>
      <span style="font-size:8px;font-weight:600;font-family:DM Mono,monospace;color:${barColor}">${usd(received,0)}</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(rate)}%;background:${barColor}"></div></div>
    <div style="font-size:7px;color:${barColor};text-align:right;margin-top:2px">${Math.round(rate)}%</div>
  </div>`;
}

function invoiceTable(invoices, hasExchange) {
  if (!invoices || invoices.length === 0) return '<p style="color:var(--text3);font-size:11px">No invoices</p>';
  return `<table>
    <thead><tr>
      <th>Invoice</th><th>Amount</th><th>Period</th>
      <th>Payment Amount</th><th>Payment Date</th><th>Notes</th>
    </tr></thead>
    <tbody>
      ${invoices.map(inv => `<tr>
        <td class="mono">${inv.invoice}</td>
        <td class="mono">${usd(inv.amount)}</td>
        <td>${inv.period}</td>
        <td class="mono">${inv.payAmount ? usd(inv.payAmount) : '—'}</td>
        <td class="mono muted">${inv.payDate || '—'}</td>
        <td class="muted">${inv.notes || ''}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function monthlyRow(bills, received) {
  return MONTHS_SHORT.map((m, i) => {
    const fullMonth = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'][i];
    const b = bills[fullMonth] || 0;
    const r = received[fullMonth] || 0;
    if (b === 0 && r === 0) return '';
    const rate = b > 0 ? Math.min(100, r / b * 100) : 0;
    const col = rate >= 95 ? 'var(--green)' : rate >= 80 ? 'var(--amber)' : 'var(--red)';
    return `<tr>
      <td>${fullMonth}</td>
      <td class="mono">${usd(b)}</td>
      <td class="mono" style="color:${col}">${usd(r)}</td>
      <td>${collBadge(rate)}</td>
    </tr>`;
  }).join('');
}

function render(d) {
  const t  = d.totals;
  const c  = d.clients;
  const av = d.avgs;
  const cf = d.cashflow;
  const h1 = d.h1;

  const now = new Date(d.lastUpdated);
  const dateStr = now.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

  // Client table rows
  const clientOrder = [
    ['flex',       'Flex',        '#3266ad'],
    ['block',      'Block',       '#7f77dd'],
    ['owlet',      'Owlet',       '#1dbd8a'],
    ['eightSleep', '8Sleep',      '#d4920a'],
    ['zetron',     'Zetron',      '#e05555'],
    ['milestone',  'Milestone',   '#5ab4c5'],
  ];

  const totalBilled = clientOrder.reduce((s,[k]) => s + (c[k]?.billed||0), 0);

  const clientRows = clientOrder.map(([key, label, color]) => {
    const cl   = c[key] || {};
    const rate = cl.billed > 0 ? cl.received / cl.billed * 100 : 0;
    const pctOfTotal = totalBilled > 0 ? (cl.billed / totalBilled * 100) : 0;
    return `<tr>
      <td><span class="dot" style="background:${color}"></span>${label}</td>
      <td class="mono">${usd(cl.billed)}</td>
      <td class="mono" style="color:var(--green)">${usd(cl.received)}</td>
      <td class="mono">${usd(cl.billed - cl.received)}</td>
      <td>${collBadge(rate)}</td>
      <td class="muted mono">${Math.round(pctOfTotal)}%</td>
    </tr>`;
  }).join('');

  // Avg monthly bars
  const avgBars = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">
    ${barBlock('flex',       'FLEX',      '#3266ad', av.flex?.avgBilled||0,       av.flex?.avgReceived||0)}
    ${barBlock('block',      'BLOCK',     '#7f77dd', av.block?.avgBilled||0,      av.block?.avgReceived||0)}
    ${barBlock('owlet',      'OWLET',     '#1dbd8a', av.owlet?.avgBilled||0,      av.owlet?.avgReceived||0)}
    ${barBlock('eightSleep', '8SLEEP',    '#d4920a', av.eightSleep?.avgBilled||0, av.eightSleep?.avgReceived||0)}
    ${barBlock('zetron',     'ZETRON',    '#e05555', av.zetron?.avgBilled||0,     av.zetron?.avgReceived||0)}
    ${barBlock('milestone',  'MILESTONE', '#5ab4c5', av.milestone?.avgBilled||0,  av.milestone?.avgReceived||0)}
  </div>`;

  // Monthly totals table
  const monthlyRows = d.monthly.labels.map((m, i) => {
    const b = d.monthly.billed[i];
    const r = d.monthly.received[i];
    if (b === 0 && r === 0) return '';
    const rate = b > 0 ? Math.min(100, r / b * 100) : 0;
    return `<tr>
      <td>${m}</td>
      <td class="mono">${usd(b)}</td>
      <td class="mono" style="color:var(--green)">${usd(r)}</td>
      <td>${collBadge(rate)}</td>
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML = `

  <div class="header">
    <div class="header-left">
      <div>
        <div class="header-title">OutpostQA — Revenue Dashboard 2026</div>
        <div class="header-sub">Updated: ${dateStr} · Live from Google Sheets</div>
      </div>
    </div>
    <span class="date-chip">${pct(t.collectionRate)} collected</span>
  </div>

  <!-- KPI row -->
  <div class="grid4 gap">
    <div class="metric" style="--ac:var(--green)">
      <div class="metric-label">H1 TOTAL BILLED</div>
      <div class="metric-value">${usd(h1.billed, 0)}</div>
      <div class="metric-sub">Jan–Jun 2026</div>
    </div>
    <div class="metric" style="--ac:var(--green)">
      <div class="metric-label">H1 TOTAL RECEIVED</div>
      <div class="metric-value">${usd(h1.received, 0)}</div>
      <div class="metric-sub">${pct(h1.rate)} collection rate</div>
    </div>
    <div class="metric" style="--ac:var(--amber)">
      <div class="metric-label">OUTSTANDING</div>
      <div class="metric-value">${usd(t.outstanding, 0)}</div>
      <div class="metric-sub">Billed not yet received</div>
    </div>
    <div class="metric" style="--ac:#5ab4c5">
      <div class="metric-label">ACTIVE CLIENTS</div>
      <div class="metric-value">6</div>
      <div class="metric-sub">Flex · Block · Owlet · 8Sleep · Zetron · Milestone</div>
    </div>
  </div>

  <!-- Client summary + monthly -->
  <div class="grid2r gap">
    <div class="card">
      <p class="sec">BILLED VS RECEIVED BY CLIENT — 2026 YTD</p>
      <table>
        <thead><tr>
          <th>Client</th><th>Billed</th><th>Received</th><th>Outstanding</th><th>Collection</th><th>% of Total</th>
        </tr></thead>
        <tbody>${clientRows}</tbody>
        <tfoot><tr style="border-top:1px solid var(--border2)">
          <td style="font-weight:600">Total</td>
          <td class="mono" style="font-weight:600">${usd(t.billed)}</td>
          <td class="mono" style="font-weight:600;color:var(--green)">${usd(t.received)}</td>
          <td class="mono" style="font-weight:600">${usd(t.outstanding)}</td>
          <td colspan="2">${collBadge(t.collectionRate)}</td>
        </tr></tfoot>
      </table>
    </div>
    <div class="card">
      <p class="sec">MONTHLY TOTALS — ALL CLIENTS</p>
      <table>
        <thead><tr><th>Month</th><th>Billed</th><th>Received</th><th>Rate</th></tr></thead>
        <tbody>${monthlyRows}</tbody>
      </table>
    </div>
  </div>

  <!-- Avg monthly + cash flow -->
  <div class="grid2 gap">
    <div class="card">
      <p class="sec">AVERAGE MONTHLY BILLED & RECEIVED PER CLIENT — YTD</p>
      ${avgBars}
    </div>
    <div class="card">
      <p class="sec">CASH FLOW PROJECTION — NEXT 60 DAYS</p>
      <div style="margin-bottom:5px;padding:7px 9px;background:var(--green-bg);border-radius:var(--radius-sm);border:0.5px solid rgba(29,189,138,.2)">
        <div style="font-size:7px;color:var(--green);font-weight:700;margin-bottom:3px">JULY 2026 — EXPECTED</div>
        <div style="font-size:18px;font-weight:500;font-family:'DM Mono',monospace;color:var(--green)">${usd(cf.julyExpected, 0)}</div>
        <div style="font-size:7.5px;color:var(--text2);margin-top:2px">Based on June billings per client</div>
      </div>
      <div style="margin-bottom:5px;padding:7px 9px;background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--border)">
        <div style="font-size:7px;color:var(--text3);font-weight:700;margin-bottom:3px">AUGUST 2026 — PROJECTED</div>
        <div style="font-size:18px;font-weight:500;font-family:'DM Mono',monospace">~${usd(cf.augProjected, 0)}</div>
        <div style="font-size:7.5px;color:var(--text2);margin-top:2px">Based on H1 monthly avg run rate</div>
      </div>
      <div style="padding:6px 8px;background:var(--green-bg);border-radius:var(--radius-sm);border:0.5px solid rgba(29,189,138,.2)">
        <div style="font-size:7px;color:var(--green);font-weight:700;margin-bottom:2px">H1 MILESTONE</div>
        <div style="font-size:7.5px;color:var(--text2)">${usd(h1.billed, 0)} billed in H1 2026 · ${pct(h1.rate)} collected · All clients current</div>
      </div>
    </div>
  </div>

  <!-- Invoice detail per client -->
  ${clientOrder.map(([key, label, color]) => `
  <div class="card gap">
    <p class="sec">INVOICE REGISTER — <span style="color:${color}">${label.toUpperCase()}</span></p>
    <div class="grid2r" style="margin-bottom:0">
      <div>
        ${invoiceTable(c[key]?.invoices || [])}
      </div>
      <div>
        <table>
          <thead><tr><th>Month</th><th>Billed</th><th>Received</th><th>Rate</th></tr></thead>
          <tbody>${monthlyRow(c[key]?.bills||{}, c[key]?.received_mo||{})}</tbody>
          <tfoot><tr style="border-top:1px solid var(--border2)">
            <td style="font-weight:600">Total</td>
            <td class="mono" style="font-weight:600">${usd(c[key]?.billed||0)}</td>
            <td class="mono" style="font-weight:600;color:var(--green)">${usd(c[key]?.received||0)}</td>
            <td>${collBadge(c[key]?.billed > 0 ? (c[key]?.received / c[key]?.billed * 100) : 0)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  </div>`).join('')}

  <!-- Contract terms -->
  <div class="card gap">
    <p class="sec">CONTRACT TERMS BY CLIENT</p>
    <div class="grid3">
      <div class="note-item"><div class="note-client">FLEX</div>Net 30 · end of month · Manual $45/hr, Auto $74/hr · <strong style="color:var(--pink)">Contractual fee</strong></div>
      <div class="note-item"><div class="note-client">BLOCK</div>Net 30 · payment in MXN · variable exchange rate · Invoices in USD</div>
      <div class="note-item"><div class="note-client">OWLET</div>Net 30 · end of month · Flat rate $23,490 USD/month</div>
      <div class="note-item"><div class="note-client">EIGHT SLEEP</div>Net 30 · end of month · L3 $50/hr · L2 $37/hr · Overtime 2x</div>
      <div class="note-item"><div class="note-client">ZETRON</div>Net 30 · <strong style="color:var(--amber)">beginning</strong> of month · Flat $25,820/month · <strong style="color:var(--pink)">Contractual fee</strong></div>
      <div class="note-item"><div class="note-client">MILESTONE</div>Net 30 · end of month · Hourly · Variable rate</div>
    </div>
  </div>

  <div class="footer">
    <span>OutpostQA · Revenue Dashboard · H1 2026 Complete · Updated ${dateStr}</span>
    <span>Internal policy: Net 30 + 15 days = 45 days · Fee applies from day 46 where contractually specified</span>
  </div>`;
}

async function loadData() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    render(data);
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:var(--red)">Error loading data: ${err.message}</div>`;
  }
}

loadData();
</script>
</body>
</html>
