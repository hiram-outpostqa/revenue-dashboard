<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OutpostQA — Revenue Dashboard 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#d4d8de;--bg2:#eaecef;--bg3:#c8ccd2;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a1e25;--text2:#5a6a7a;--text3:#8a9ab0;--green:#1dbd8a;--green-bg:rgba(29,189,138,0.12);--amber:#d4920a;--amber-bg:rgba(212,146,10,0.12);--red:#e05555;--red-bg:rgba(224,85,85,0.12);--pink:#d4538a;--pink-bg:rgba(212,83,138,0.12);--radius:7px;--radius-sm:5px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:1.5rem 2rem;font-size:12px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border2)}
.header-title{font-size:26px;font-weight:600}
.header-sub{font-size:11px;color:var(--text3);margin-top:3px}
.date-chip{background:var(--green-bg);color:var(--green);border:0.5px solid rgba(29,189,138,.25);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;font-family:'DM Mono',monospace}
.sec{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:0.5px;background:var(--border2)}
.card{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid2r{display:grid;grid-template-columns:2fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.metric{background:#fff;border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;position:relative;overflow:hidden;margin-bottom:0}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--green))}
.metric-label{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:.04em;font-weight:600}
.metric-value{font-size:24px;font-weight:500;font-family:'DM Mono',monospace}
.metric-sub{font-size:11px;color:var(--text2);margin-top:4px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);padding:7px 10px;border-bottom:0.5px solid var(--border2);letter-spacing:.04em}
td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;font-size:12px}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ok{background:var(--green-bg);color:var(--green)}
.warn{background:var(--amber-bg);color:var(--amber)}
.err{background:var(--red-bg);color:var(--red)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.mono{font-family:'DM Mono',monospace}
.muted{color:var(--text2)}
.note-item{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 14px;font-size:12px;color:var(--text2);line-height:1.6}
.note-client{font-size:11px;font-weight:700;color:#3266ad;margin-bottom:4px;letter-spacing:.05em}
.footer{margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--border2);font-size:11px;color:var(--text3);display:flex;justify-content:space-between}
.bar-bg{width:100%;background:var(--bg3);border-radius:4px;height:5px;overflow:hidden;margin-top:4px}
.bar-fill{height:5px;border-radius:4px}
.loading{text-align:center;padding:3rem;color:var(--text3);font-family:'DM Mono',monospace;font-size:13px}
.avg-card{background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px;border:0.5px solid var(--border)}
.avg-client{font-size:9px;font-weight:700;margin-bottom:5px}
.avg-row{display:flex;justify-content:space-between;margin-bottom:1px}
.avg-label{font-size:9px;color:var(--text3)}
.avg-val{font-size:10px;font-weight:600;font-family:'DM Mono',monospace}
canvas{max-width:100%}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading data from Google Sheets…</div></div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzwgz0yI5H6xrqWluT9ztEGDU09a6VASKNFGNuyKi0usSZrhe7G1PxoHQTw1MmH03Fw/exec';
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function usd(n, dec) {
  if (n === undefined || n === null) return '—';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: dec??2, maximumFractionDigits: dec??2});
}
function pct(n) { return (Math.round(n*10)/10) + '%'; }
function badge(rate) {
  if (rate >= 95) return `<span class="badge ok">✓ ${pct(rate)}</span>`;
  if (rate >= 80) return `<span class="badge warn">⚠ ${pct(rate)}</span>`;
  return `<span class="badge err">✗ ${pct(rate)}</span>`;
}

const CLIENT_ORDER = [
  {key:'flex',      label:'Flex',      color:'#3266ad'},
  {key:'block',     label:'Block',     color:'#7f77dd'},
  {key:'owlet',     label:'Owlet',     color:'#1dbd8a'},
  {key:'eightSleep',label:'8Sleep',    color:'#d4920a'},
  {key:'zetron',    label:'Zetron',    color:'#e05555'},
  {key:'milestone', label:'Milestone', color:'#5ab4c5'},
];

let chartMonthly = null;
let chartClients = null;

function invoiceTable(invoices) {
  if (!invoices || !invoices.length) return '<p style="color:var(--text3);font-size:11px;padding:8px 0">No invoices found</p>';
  return `<table>
    <thead><tr><th>Invoice</th><th>Amount</th><th>Period</th><th>Payment Amount</th><th>Payment Date</th><th>Notes</th></tr></thead>
    <tbody>${invoices.map(inv => `<tr>
      <td class="mono">${inv.invoice}</td>
      <td class="mono">${usd(inv.amount)}</td>
      <td>${inv.period}</td>
      <td class="mono">${inv.payAmount ? usd(inv.payAmount) : '—'}</td>
      <td class="mono muted" style="font-size:11px">${inv.payDate || '—'}</td>
      <td class="muted">${inv.notes || ''}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function monthlyClientRows(bills, received_mo) {
  return MONTHS_FULL.map(mo => {
    const b = (bills||{})[mo] || 0;
    const r = (received_mo||{})[mo] || 0;
    if (b === 0 && r === 0) return '';
    const rate = b > 0 ? Math.min(200, r/b*100) : 0;
    return `<tr>
      <td>${mo}</td>
      <td class="mono">${usd(b)}</td>
      <td class="mono" style="color:${rate>=95?'var(--green)':rate>=80?'var(--amber)':'var(--red)'}">${usd(r)}</td>
      <td>${badge(rate)}</td>
    </tr>`;
  }).join('');
}

function drawCharts(d) {
  // Monthly billed vs received chart
  const activeMonths = MONTHS_FULL.filter((_,i) => d.monthly.billed[i] > 0 || d.monthly.received[i] > 0);
  const activeIdx    = MONTHS_FULL.map((_,i) => i).filter(i => d.monthly.billed[i] > 0 || d.monthly.received[i] > 0);
  const billedData   = activeIdx.map(i => d.monthly.billed[i]);
  const receivedData = activeIdx.map(i => d.monthly.received[i]);
  const labels       = activeIdx.map(i => MONTHS_SHORT[i]);

  if (chartMonthly) chartMonthly.destroy();
  chartMonthly = new Chart(document.getElementById('chartMonthly'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Billed',   data: billedData,   backgroundColor: 'rgba(50,102,173,0.75)', borderRadius: 4 },
        { label: 'Received', data: receivedData, backgroundColor: 'rgba(29,189,138,0.75)', borderRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { family: 'DM Sans', size: 11 }, boxWidth: 12 } },
                 tooltip: { callbacks: { label: ctx => ' ' + usd(ctx.raw, 0) } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 11 } } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family: 'DM Mono', size: 10 }, callback: v => '$' + (v>=1000?Math.round(v/1000)+'k':v) } }
      }
    }
  });

  // Client billed vs received bar chart
  const clientLabels   = CLIENT_ORDER.map(c => c.label);
  const clientBilled   = CLIENT_ORDER.map(c => d.clients[c.key]?.billed || 0);
  const clientReceived = CLIENT_ORDER.map(c => d.clients[c.key]?.received || 0);
  const clientColors   = CLIENT_ORDER.map(c => c.color);

  if (chartClients) chartClients.destroy();
  chartClients = new Chart(document.getElementById('chartClients'), {
    type: 'bar',
    data: {
      labels: clientLabels,
      datasets: [
        { label: 'Billed',   data: clientBilled,   backgroundColor: clientColors.map(c => c + 'bb'), borderRadius: 4 },
        { label: 'Received', data: clientReceived, backgroundColor: clientColors.map(c => c + '66'), borderRadius: 4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'top', labels: { font: { family: 'DM Sans', size: 11 }, boxWidth: 12 } },
                 tooltip: { callbacks: { label: ctx => ' ' + usd(ctx.raw, 0) } } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 11 } } },
        y: { grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { family: 'DM Mono', size: 10 }, callback: v => '$' + (v>=1000?Math.round(v/1000)+'k':v) } }
      }
    }
  });
}

function render(d) {
  const t  = d.totals;
  const c  = d.clients;
  const av = d.avgs;
  const cf = d.cashflow;
  const h1 = d.h1;
  const dateStr = new Date(d.lastUpdated).toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'});
  const totalBilled = CLIENT_ORDER.reduce((s,{key}) => s + (c[key]?.billed||0), 0);

  const clientRows = CLIENT_ORDER.map(({key,label,color}) => {
    const cl  = c[key] || {};
    const rt  = cl.billed > 0 ? cl.received/cl.billed*100 : 0;
    const pof = totalBilled > 0 ? cl.billed/totalBilled*100 : 0;
    return `<tr>
      <td><span class="dot" style="background:${color}"></span>${label}</td>
      <td class="mono">${usd(cl.billed)}</td>
      <td class="mono" style="color:var(--green)">${usd(cl.received)}</td>
      <td class="mono">${usd((cl.billed||0)-(cl.received||0))}</td>
      <td>${badge(rt)}</td>
      <td class="muted mono">${Math.round(pof)}%</td>
    </tr>`;
  }).join('');

  const monthlyRows = MONTHS_FULL.map((mo,i) => {
    const b = d.monthly.billed[i];
    const r = d.monthly.received[i];
    if (!b && !r) return '';
    const rt = b > 0 ? Math.min(200, r/b*100) : 0;
    return `<tr>
      <td>${MONTHS_SHORT[i]}</td>
      <td class="mono">${usd(b,0)}</td>
      <td class="mono" style="color:${rt>=95?'var(--green)':rt>=80?'var(--amber)':'var(--red)'}">${usd(r,0)}</td>
      <td>${badge(rt)}</td>
    </tr>`;
  }).join('');

  const avgBars = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
    ${CLIENT_ORDER.map(({key,label,color}) => {
      const ab = av[key]?.avgBilled || 0;
      const ar = av[key]?.avgReceived || 0;
      const rt = ab > 0 ? Math.min(200, ar/ab*100) : 0;
      const barColor = rt>=95?'var(--green)':rt>=80?'var(--amber)':'var(--red)';
      return `<div class="avg-card">
        <div class="avg-client" style="color:${color}">${label.toUpperCase()}</div>
        <div class="avg-row"><span class="avg-label">Billed/mo</span><span class="avg-val">${usd(ab,0)}</span></div>
        <div class="avg-row"><span class="avg-label">Received/mo</span><span class="avg-val" style="color:${barColor}">${usd(ar,0)}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round(rt))}%;background:${barColor}"></div></div>
        <div style="font-size:9px;color:${barColor};text-align:right;margin-top:2px">${Math.round(rt)}%</div>
      </div>`;
    }).join('')}
  </div>`;

  const invoiceBlocks = CLIENT_ORDER.map(({key,label,color}) => `
  <div class="card">
    <p class="sec">INVOICE REGISTER — <span style="color:${color}">${label.toUpperCase()}</span></p>
    <div class="grid2r" style="gap:16px">
      <div>${invoiceTable(c[key]?.invoices||[])}</div>
      <div>
        <table>
          <thead><tr><th>Month</th><th>Billed</th><th>Received</th><th>Rate</th></tr></thead>
          <tbody>${monthlyClientRows(c[key]?.bills, c[key]?.received_mo)}</tbody>
          <tfoot><tr style="border-top:1px solid var(--border2)">
            <td style="font-weight:600">Total</td>
            <td class="mono" style="font-weight:600">${usd(c[key]?.billed||0)}</td>
            <td class="mono" style="font-weight:600;color:var(--green)">${usd(c[key]?.received||0)}</td>
            <td>${badge(c[key]?.billed > 0 ? (c[key]?.received||0)/(c[key]?.billed)*100 : 0)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  </div>`).join('');

  document.getElementById('app').innerHTML = `
  <div class="header">
    <div>
      <div class="header-title">OutpostQA — Revenue Dashboard 2026</div>
      <div class="header-sub">Updated: ${dateStr} · Live from Google Sheets</div>
    </div>
    <span class="date-chip">${pct(t.collectionRate)} collected</span>
  </div>

  <!-- KPI row -->
  <div class="grid4" style="margin-bottom:10px">
    <div class="metric" style="--ac:var(--green)">
      <div class="metric-label">H1 TOTAL BILLED</div>
      <div class="metric-value">${usd(h1.billed,0)}</div>
      <div class="metric-sub">Jan–Jun 2026</div>
    </div>
    <div class="metric" style="--ac:var(--green)">
      <div class="metric-label">H1 TOTAL RECEIVED</div>
      <div class="metric-value">${usd(h1.received,0)}</div>
      <div class="metric-sub">${pct(h1.rate)} collection rate</div>
    </div>
    <div class="metric" style="--ac:var(--amber)">
      <div class="metric-label">OUTSTANDING</div>
      <div class="metric-value">${usd(t.outstanding,0)}</div>
      <div class="metric-sub">Billed not yet received</div>
    </div>
    <div class="metric" style="--ac:#5ab4c5">
      <div class="metric-label">ACTIVE CLIENTS</div>
      <div class="metric-value">6</div>
      <div class="metric-sub">Flex · Block · Owlet · 8Sleep · Zetron · Milestone</div>
    </div>
  </div>

  <!-- Client table + monthly table -->
  <div class="grid2r" style="margin-bottom:10px">
    <div class="card" style="margin-bottom:0">
      <p class="sec">BILLED VS RECEIVED BY CLIENT — 2026 YTD</p>
      <table>
        <thead><tr><th>Client</th><th>Billed</th><th>Received</th><th>Outstanding</th><th>Collection</th><th>% of Total</th></tr></thead>
        <tbody>${clientRows}</tbody>
        <tfoot><tr style="border-top:1px solid var(--border2)">
          <td style="font-weight:600">Total</td>
          <td class="mono" style="font-weight:600">${usd(t.billed)}</td>
          <td class="mono" style="font-weight:600;color:var(--green)">${usd(t.received)}</td>
          <td class="mono" style="font-weight:600">${usd(t.outstanding)}</td>
          <td colspan="2">${badge(t.collectionRate)}</td>
        </tr></tfoot>
      </table>
    </div>
    <div class="card" style="margin-bottom:0">
      <p class="sec">MONTHLY TOTALS — ALL CLIENTS</p>
      <table>
        <thead><tr><th>Month</th><th>Billed</th><th>Received</th><th>Rate</th></tr></thead>
        <tbody>${monthlyRows}</tbody>
      </table>
    </div>
  </div>

  <!-- Charts row -->
  <div class="grid2" style="margin-bottom:10px">
    <div class="card" style="margin-bottom:0">
      <p class="sec">MONTHLY BILLED VS RECEIVED — ALL CLIENTS</p>
      <div style="height:220px"><canvas id="chartMonthly"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <p class="sec">BILLED VS RECEIVED BY CLIENT — YTD</p>
      <div style="height:220px"><canvas id="chartClients"></canvas></div>
    </div>
  </div>

  <!-- Avg monthly + cashflow -->
  <div class="grid2" style="margin-bottom:10px">
    <div class="card" style="margin-bottom:0">
      <p class="sec">AVERAGE MONTHLY BILLED & RECEIVED PER CLIENT — YTD</p>
      ${avgBars}
    </div>
    <div class="card" style="margin-bottom:0">
      <p class="sec">CASH FLOW PROJECTION — NEXT 60 DAYS</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="padding:10px 12px;background:var(--green-bg);border-radius:var(--radius-sm);border:0.5px solid rgba(29,189,138,.2)">
          <div style="font-size:9px;color:var(--green);font-weight:700;margin-bottom:3px">JULY 2026 — EXPECTED</div>
          <div style="font-size:22px;font-weight:500;font-family:'DM Mono',monospace;color:var(--green)">${usd(cf.julyExpected,0)}</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px">Based on June billings per client</div>
        </div>
        <div style="padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm);border:0.5px solid var(--border)">
          <div style="font-size:9px;color:var(--text3);font-weight:700;margin-bottom:3px">AUGUST 2026 — PROJECTED</div>
          <div style="font-size:22px;font-weight:500;font-family:'DM Mono',monospace">~${usd(cf.augProjected,0)}</div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px">Based on H1 monthly avg run rate</div>
        </div>
        <div style="padding:8px 12px;background:var(--green-bg);border-radius:var(--radius-sm);border:0.5px solid rgba(29,189,138,.2)">
          <div style="font-size:9px;color:var(--green);font-weight:700;margin-bottom:2px">H1 MILESTONE</div>
          <div style="font-size:11px;color:var(--text2)">${usd(h1.billed,0)} billed in H1 2026 · ${pct(h1.rate)} collected · All clients current</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Invoice detail per client -->
  ${invoiceBlocks}

  <!-- Contract terms -->
  <div class="card">
    <p class="sec">CONTRACT TERMS BY CLIENT</p>
    <div class="grid3">
      <div class="note-item"><div class="note-client">FLEX</div>Net 30 · end of month · Manual $45/hr, Auto $74/hr · <strong style="color:var(--pink)">Contractual fee</strong></div>
      <div class="note-item"><div class="note-client">BLOCK</div>Net 30 · payment in MXN · variable exchange rate · Invoices in USD</div>
      <div class="note-item"><div class="note-client">OWLET</div>Net 30 · end of month · Flat rate $23,490 USD/month</div>
      <div class="note-item"><div class="note-client">EIGHT SLEEP</div>Net 30 · end of month · L3 $50/hr · L2 $37/hr · Overtime 2x</div>
      <div class="note-item"><div class="note-client">ZETRON</div>Net 30 · <strong style="color:var(--amber)">beginning</strong> of month · Flat $25,820/month · <strong style="color:var(--pink)">Contractual fee</strong></div>
      <div class="note-item"><div class="note-client">MILESTONE</div>Net 30 · end of month · Hourly · Variable rate</div>
    </div>
  </div>

  <div class="footer">
    <span>OutpostQA · Revenue Dashboard · H1 2026 Complete · Updated ${dateStr}</span>
    <span>Internal policy: Net 30 + 15 days = 45 days · Fee applies from day 46 where contractually specified</span>
  </div>`;

  // Draw charts after DOM is ready
  requestAnimationFrame(() => drawCharts(d));
}

async function loadData() {
  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    render(data);
  } catch(err) {
    document.getElementById('app').innerHTML =
      `<div class="loading" style="color:var(--red)">Error loading data: ${err.message}</div>`;
  }
}

loadData();
</script>
</body>
</html>
